{% extends 'base.html' %}
{% block body %}
<div class="app-layout">
  {% include 'components/sidebar.html' %}
  <main class="main-content">
    <div class="page-header"><h1>✏️ Loyihani Tahrirlash</h1></div>
    <div class="glass-card p-24" style="max-width:700px;">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group"><label class="form-label">📝 Loyiha nomi</label><input type="text" name="title" class="form-input" value="{{ project.title }}" required></div>
        <div style="display:flex;gap:12px;margin-top:24px;">
          <button type="submit" class="btn btn-primary">✅ Saqlash</button>
          <a href="{% url 'projects:detail' project.pk %}" class="btn btn-glass">← Orqaga</a>
        </div>
      </form>
    </div>
  </main>
</div>
{% endblock %}
