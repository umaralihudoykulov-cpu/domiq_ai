{% extends 'base.html' %}
{% block body %}
<div class="app-layout">
  {% include 'components/sidebar.html' %}
  <main class="main-content">
    <div class="glass-card p-24" style="max-width:500px;margin:100px auto;text-align:center;">
      <div style="font-size:3rem;margin-bottom:16px;">⚠️</div>
      <h2>Loyihani o'chirish</h2>
      <p class="text-2" style="margin:16px 0;">"{{ project.title }}" ni o'chirishni tasdiqlaysizmi?</p>
      <form method="post" style="display:flex;gap:12px;justify-content:center;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">🗑️ Ha, o'chirish</button>
        <a href="{% url 'projects:detail' project.pk %}" class="btn btn-glass">← Bekor</a>
      </form>
    </div>
  </main>
</div>
{% endblock %}
